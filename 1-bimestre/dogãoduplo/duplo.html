<body>

    <!-- Tela de Login -->
    <div class="login" id="telaLogin">
        <h1>Login</h1>

        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="fazerLogin()">Entrar</button>

        <p id="mensagemErro"></p>
    </div>

    <!-- Menu/Cardápio -->
    <div class="card" id="menu" style="display: none;">
        <h1>Dogão</h1>
        <p class="subtitle">Cardápio</p>

        <p class="secao-titulo">Lanches</p>

        <div class="item">
            <label for="inputdogbasico">
                <span class="item-nome">Cachorro quente básico</span>
                <span class="item-preco">R$22,00</span>
            </label>
            <input type="number" id="inputdogbasico" min="0" value="0">
        </div>

        <div class="item">
            <label for="inputdogcompleto">
                <span class="item-nome">Cachorro quente duplo</span>
                <span class="item-preco">R$26,00</span>
            </label>
            <input type="number" id="inputdogcompleto" min="0" value="0">
        </div>

        <div class="item">
            <label for="inputXsalada">
                <span class="item-nome">X-salada</span>
                <span class="item-preco">R$29,00</span>
            </label>
            <input type="number" id="inputXsalada" min="0" value="0">
        </div>

        <p class="secao-titulo">Bebidas</p>

        <div class="item">
            <label for="inputRefriP">
                <span class="item-nome">Refrigerante 350mL</span>
                <span class="item-preco">R$5,00</span>
            </label>
            <input type="number" id="inputRefriP" min="0" value="0">
        </div>

        <div class="item">
            <label for="inputRefriG">
                <span class="item-nome">Refrigerante 1L</span>
                <span class="item-preco">R$8,00</span>
            </label>
            <input type="number" id="inputRefriG" min="0" value="0">
        </div>

        <button onclick="calcularTotal()">Calcular</button>
        <p id="resultado"></p>
    </div>

    <script src="dogãoduplo.js"></script>
</body>
