<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Programa Bhaskara</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 300px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            margin-top: 10px;
            text-align: left;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input[type="button"] {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="button"]:hover {
            background: #00c6ff;
        }

        .resultado {
            margin-top: 15px;
            font-size: 18px;
            color: #333;
        }

        span {
            font-weight: bold;
            color: #4facfe;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Bhaskara</h1>

        <label for="inputA">A</label>
        <input type="number" id="inputA">

        <label for="inputB">B</label>
        <input type="number" id="inputB">

        <label for="inputC">C</label>
        <input type="number" id="inputC">

        <input type="button" value="Calcular" onclick="calcular()">

        <div class="resultado">
            x1: <span id="resposta1">...</span><br>
            x2: <span id="resposta2">...</span>
        </div>
    </div>

    <script>
        function calcular() {
            let a = parseFloat(document.getElementById("inputA").value);
            let b = parseFloat(document.getElementById("inputB").value);
            let c = parseFloat(document.getElementById("inputC").value);

            if (a === 0) {
                alert("A não pode ser 0!");
                return;
            }

            let delta = b * b - 4 * a * c;

            if (delta < 0) {
                document.getElementById("resposta1").innerHTML = "Sem raízes reais";
                document.getElementById("resposta2").innerHTML = "Sem raízes reais";
                return;
            }

            let x1 = (-b + Math.sqrt(delta)) / (2 * a);
            let x2 = (-b - Math.sqrt(delta)) / (2 * a);

            document.getElementById("resposta1").innerHTML = x1.toFixed(2);
            document.getElementById("resposta2").innerHTML = x2.toFixed(2);
        }
    </script>

</body>

</html>
