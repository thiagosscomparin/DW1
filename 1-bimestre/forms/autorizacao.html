<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="autorizacao.css">
</head>
<body>
    <h1>AUTORIZAÇÃO DE VIAGEM ESPORTIVA</h1>
    <p id="msg"></p>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dados = JSON.parse(decodeURIComponent(urlParams.get('dados')));
        const msgElement = document.getElementById('msg');
        msgElement.innerHTML = `
            O atleta <strong>${dados.nome}</strong>, com CPF <strong>${dados.cpf}</strong> e idade <strong>${dados.idade}</strong>, está autorizado a participar da modalidade de <strong>${dados.modalidade}</strong> em um deslocamento de <strong>${dados.origem}</strong> para <strong>${dados.destino}</strong>. O responsável por esta autorização é <strong>${dados.responsavel}</strong>.
        `;
        </script>
</body>
</html>
