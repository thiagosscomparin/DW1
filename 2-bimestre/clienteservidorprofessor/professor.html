<!DOCTYPE html>
<html>

<head>
    <title>Enviar mensagens</title>
</head>

<body>
    <h1>Envie uma mensagem para o servidor</h1>
    <label for="enderecoServidorInput">Endereço do Servidor:</label>
    <input type="text" id="enderecoServidorInput" placeholder="Digite o endereço do servidor" value="localhost"><br><br>
    
    <label for="inputPorta">Porta:</label>
    <input type="text" id="inputPorta" placeholder="Digite a porta" value="3000"><br><br>
    <label for="inputNome">Nome do aluno:</label>
    <input type="text" id="inputNome" placeholder="Digite o nome do aluno">
    <br><br>
    <label for="inputNota">Nota do aluno:</label>
    <input type="text" id="inputNota" placeholder="Digite a nota do aluno">
    <button onclick="enviarMensagem()">Enviar</button>
    <br>
    <br>
    <h3> Resposta do servidor</h3>
    <span id="respostaDoServidor">.....</span>    

    <script>
        async function enviarMensagem() {            
            const nomeAluno = document.getElementById('inputNome').value;
            const enderecoServidor = document.getElementById('enderecoServidorInput').value;
            const porta = document.getElementById('inputPorta').value;
            // Criando um pacote de dados para enviar ao servidor
            const meuPacoteDeDados = {               
                nome: (document.getElementById('inputNome').value),
                nota: parseFloat(document.getElementById('inputNota').value)
            };
            debugger
            //processo de envio da mensagem para o servidor usando fetch API
            try {
                const response = await fetch(`http://${enderecoServidor}:${porta}/enviar-mensagem`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(meuPacoteDeDados),
                });
                //quando retornar a resposta do servidor, aguarde e processe a resposta
               const data = await response.json();

const aprovacao = data.aprovação;; // ANALISE a resposta JSON para extrair o resultado

                
                
               document.getElementById("respostaDoServidor").innerHTML =
"O aluno " + nomeAluno + " foi " + aprovacao;
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro na comunicação com o servidor');
            }
        }
    </script>
</body>

</html>
